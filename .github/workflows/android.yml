name: Android CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            2>&1 | tail -5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            2>&1 | tail -5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 -d > ${{ github.workspace }}/release.jks

      - name: Sign APK with apksigner
        run: |
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*-unsigned.apk" | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          fi
          SIGNED_APK="${UNSIGNED_APK%-unsigned.apk}-signed.apk"
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools/" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks "${{ github.workspace }}/release.jks" \
            --ks-type PKCS12 \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"
          echo "SIGNED_APK=$SIGNED_APK" >> $GITHUB_ENV

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: BatterySentinel v${{ steps.version.outputs.version }}
          body: |
            ## BatterySentinel v${{ steps.version.outputs.version }}

            **Mindestanforderung:** Android 14 (API 34) · Getestet auf Pixel 8 Pro (Android 16)

            ---

            ### Was die App macht

            BatterySentinel ist ein Batterie-Monitor für Android mit Echtzeit-Überwachung, Ladehistorie, App-Nutzungsstatistiken und aktiver Akku-Optimierung.

            **Dashboard**
            - Echtzeit-Anzeige: Ladestand (%), Strom (mA), Spannung (mV), Temperatur (°C)
            - Drain-Rate (% pro Stunde), Stunden bis leer, Ladezyklenanzahl
            - Akku-Gesundheitsschätzung und Hardware-Status

            **Charging**
            - Aktiver Ladestatus mit Leistungsanzeige (W) und geschätzter Ladezeit (ETA)
            - Ladehistorie mit Gesundheits-Trend-Chart
            - Statistiken: Durchschnittsdauer, mAh je Session, Gesundheitsprozent

            **Apps**
            - App-Nutzungszeit nach Vordergrundzeit sortiert
            - Batterieverbrauch pro App (mAh)
            - "Pro Zyklus"-Ansicht: Nutzungszeit je Ladesession

            **Optimize**
            - Bildschirmhelligkeit (manuell oder adaptiv), Schnellvorwahl Low/Medium
            - Bildschirmtimeout (15s bis 10min)
            - Energiesparmodus und Doze-Status
            - Hintergrund-Sync ein/aus
            - Akku-Pflegetipps (Ladebereich, Temperatur, Helligkeit, Netzwerk, Timeout)
            - **Alle Einstellungen werden erst nach Klick auf "Run" angewendet**

            **Settings**
            - Lade- und Temperaturalarm (konfigurierbare Schwellwerte)
            - Benachrichtigungen ein/aus
            - 5 rotierende System-Backups (ältestes wird automatisch überschrieben)
            - Backup wiederherstellen
            - Datenlöschung (DSGVO Art. 17), 90-Tage-Datenretention
            - About-Seite mit Changelog und Datenschutzerklärung

            **Hintergrund**
            - ForegroundService für kontinuierliches Monitoring (1s Intervall)
            - Room-Datenbank für Sessions und Batterie-Samples
            - WorkManager für periodische Anomalie-Erkennung
            - Boot-Receiver: Service startet automatisch nach Geräteneustart
            - Benachrichtigungen öffnen die App beim Antippen

            ---

            ### Neu in v${{ steps.version.outputs.version }}

            - **Auto-Update:** App prüft beim Start auf neue GitHub-Releases und bietet direkten Download und Installation an
            - **Optimize – Run-Button:** Einstellungen werden erst nach explizitem Klick auf "Run" auf das System angewendet; ohne Run-Klick keine Systemänderungen
            - **Versionierung:** versionCode 2, versionName 1.1.1

            ---

            ### Änderungen seit v1.0.0

            - Swipe-Navigation zwischen allen fünf Tabs
            - Ladezyklen korrekt aus Hardware-APIs ausgelesen (kein SELinux-Spam mehr)
            - Charging-Tab: Neugestaltung mit aktivem Ladestatus, Leistungsanzeige und ETA
            - Apps: Alle Einträge anklickbar (öffnet Android App-Einstellungen)
            - Apps: "Pro Zyklus"-Ansicht für sitzungsbezogene Nutzungszeit
            - Settings: About-Seite mit Changelog und Datenschutzerklärung
            - DSGVO: Datenlöschfunktion und Datenschutzerklärung
            - APK-Signing auf apksigner umgestellt (PKCS12-kompatibel)
            - GitHub Actions: Android SDK API 36 wird automatisch installiert
            - Auto-Update-Funktion mit Download-Fortschrittsanzeige
            - Optimize: Run-Button für kontrollierte Anwendung von Einstellungen

            ---

            ### Installation

            1. APK herunterladen
            2. Auf dem Gerät: **Einstellungen → Apps → Unbekannte Quellen** aktivieren
            3. APK öffnen und installieren
          files: ${{ env.SIGNED_APK }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
