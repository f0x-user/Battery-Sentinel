name: Android CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            2>&1 | tail -5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            2>&1 | tail -5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 -d > ${{ github.workspace }}/release.jks

      - name: Sign APK with apksigner
        run: |
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*-unsigned.apk" | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          fi
          SIGNED_APK="BatterySentinel.apk"
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools/" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks "${{ github.workspace }}/release.jks" \
            --ks-type PKCS12 \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"
          echo "SIGNED_APK=$SIGNED_APK" >> $GITHUB_ENV

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: BatterySentinel v${{ steps.version.outputs.version }}
          body: |
            ## BatterySentinel v${{ steps.version.outputs.version }}

            **Minimum requirement:** Android 14 (API 34) · Tested on Pixel 8 Pro (Android 16)

            ---

            ### What the app does

            BatterySentinel is a battery monitor for Android with real-time tracking, charge history, per-app usage statistics, and active battery optimization.

            **Dashboard**
            - Real-time display: charge level (%), current (mA), voltage (mV), temperature (°C)
            - Drain rate (% per hour), hours until empty, charge cycle count
            - Battery health estimate and hardware status

            **Charging**
            - Active charging status with power display (W) and estimated time to full (ETA)
            - Charge history with health trend chart
            - Statistics: average duration, mAh per session, health percentage

            **Apps**
            - App usage time sorted by foreground time
            - Battery consumption per app (mAh)
            - Per-cycle view: usage time per charging session

            **Optimize**
            - Display brightness (manual or adaptive), quick presets Low / Medium
            - Screen timeout (15s to 10min)
            - Battery saver mode and Doze status
            - Background sync on / off
            - Battery care tips (charge range, temperature, brightness, network, timeout)
            - All settings are only applied after pressing the **Run** button

            **Settings**
            - Charge and temperature alert thresholds (configurable)
            - Notifications on / off
            - 5 rotating system backups (oldest overwritten automatically)
            - Restore backup
            - Data deletion (GDPR Art. 17), 90-day data retention
            - About page with changelog and privacy policy

            **Background**
            - ForegroundService for continuous monitoring (1s interval)
            - Room database for sessions and battery samples
            - WorkManager for periodic anomaly detection
            - Boot receiver: service starts automatically after device reboot
            - Notifications open the app when tapped

            ---

            ### New in v${{ steps.version.outputs.version }}

            - **Auto-update:** App checks for new GitHub releases on startup and offers direct download and installation with a progress bar
            - **Optimize – Run button:** Settings are staged and only applied to the system after explicitly pressing Run; no system changes without pressing Run
            - **Crash fix:** `BatteryManager.getIntProperty()` now catches `SecurityException` on Android 16 — battery percentage is read from Intent extras (no permission required); current, charge counter, and cycle count fall back to 0 gracefully when `BATTERY_STATS` is not granted
            - **Version bump:** versionCode 2, versionName 1.1.1

            ---

            ### Changes since v1.0.0

            - Swipe navigation between all five tabs
            - Charge cycles read correctly from hardware APIs (no more SELinux spam)
            - Charging tab: redesigned with active charging status, power display, and ETA
            - Apps: all entries tappable (opens Android app settings)
            - Apps: per-cycle view for session-based usage time
            - Settings: About page with changelog and privacy policy
            - GDPR: data deletion function and privacy policy
            - APK signing switched to apksigner (PKCS12-compatible)
            - GitHub Actions: Android SDK API 36 installed automatically
            - Auto-update with download progress indicator
            - Optimize: Run button for controlled application of settings
            - Crash fix: SecurityException handling for BatteryManager on Android 16

            ---

            ### Installation

            1. Download the APK
            2. On the device: go to **Settings → Apps → Install unknown apps** and allow it
            3. Open the APK and install
          files: ${{ env.SIGNED_APK }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
